name: Release

on:
  push:
    branches:
      - main
      - 'release/**'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # nbgv needs full history to count commits

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      # nbgv computes version as {major}.{minor}.{height} from version.json.
      # We append -beta on main; release/* branches get a clean version.
      - name: Compute version
        id: ver
        run: |
          NUMERIC=$(npx nbgv get-version -v SimpleVersion)
          if [[ "$GITHUB_REF" == refs/heads/main ]]; then
            FULL="${NUMERIC}-beta"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            FULL="${NUMERIC}"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "numeric=$NUMERIC" >> "$GITHUB_OUTPUT"
          echo "full=$FULL"       >> "$GITHUB_OUTPUT"
          echo "Computed version: $FULL"

      # vsce requires a plain Major.Minor.Patch version — no prerelease suffix.
      - name: Stamp version in package.json
        run: npm version --no-git-tag-version ${{ steps.ver.outputs.numeric }}

      - name: Package extension
        run: |
          PRE_RELEASE=""
          [[ "${{ steps.ver.outputs.prerelease }}" == "true" ]] && PRE_RELEASE="--pre-release"
          npx vsce package --no-dependencies $PRE_RELEASE

      # Publish to VS Code Marketplace.
      # Requires VSCE_PAT secret — see CONTRIBUTING or repo settings.
      # main builds are published as pre-release; release/* as stable.
      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          PRE_RELEASE=""
          [[ "${{ steps.ver.outputs.prerelease }}" == "true" ]] && PRE_RELEASE="--pre-release"
          npx vsce publish $PRE_RELEASE \
            --packagePath "laika-${{ steps.ver.outputs.numeric }}.vsix" \
            --pat "$VSCE_PAT"

      - name: Rename .vsix to include full version
        run: mv laika-${{ steps.ver.outputs.numeric }}.vsix laika-${{ steps.ver.outputs.full }}.vsix

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FULL: ${{ steps.ver.outputs.full }}
        run: |
          PRERELEASE=""
          [[ "${{ steps.ver.outputs.prerelease }}" == "true" ]] && PRERELEASE="--prerelease"
          gh release create "v${FULL}" ${PRERELEASE} \
            --title "v${FULL}" \
            --generate-notes \
            "laika-${FULL}.vsix#VS Code Extension"
