name: PR Validation

on:
  pull_request:
    branches:
      - main
      - 'release/**'
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - '.vscode/**'
      - '.claude/**'

permissions:
  contents: read

jobs:
  validate:
    name: Type Check, Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check-types

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test
